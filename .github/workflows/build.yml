name: Сборка АРК

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.head_commit.message != '' && !contains(github.event.head_commit.message, '[skip ci]')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build libclient.so
        run: |
          export ANDROID_NDK_HOME="$(ls -d "$ANDROID_HOME/ndk"/* | sort -V | tail -n1)"
          chmod +x scripts/build-go-lib.sh
          ./scripts/build-go-lib.sh arm64-v8a
          ls -lh app/src/main/jniLibs/arm64-v8a/

      - name: Generate signing keystore
        run: |
          keytool -genkey -v \
            -keystore ${{ github.workspace }}/bypassme-release.jks \
            -alias bypassme \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=ByPassMe, O=ByPassMe, C=RU" \
            -storepass bypassme2024 \
            -keypass bypassme2024

      - name: Write local.properties
        run: |
          echo "KEYSTORE_FILE=${{ github.workspace }}/bypassme-release.jks" >> local.properties
          echo "KEYSTORE_PASSWORD=bypassme2024" >> local.properties
          echo "KEY_ALIAS=bypassme" >> local.properties
          echo "KEY_PASSWORD=bypassme2024" >> local.properties
          echo "REPO_ACCESS_TOKEN=${{ secrets.HUB_MOS_TOKEN }}" >> local.properties

      - name: Download libv2ray (AndroidLibXrayLite)
        run: |
          mkdir -p app/libs
          curl -sL -o app/libs/libv2ray.aar \
            "https://github.com/2dust/AndroidLibXrayLite/releases/download/v26.6.22/libv2ray.aar"
          ls -lh app/libs/

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ByPassMe-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Rename APK
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          cp "$APK" ByPassMe.apk
          ls -lh ByPassMe.apk

      - name: Publish release
        run: |
          TAG="v$(date +'%Y%m%d%H%M')"
          gh release create "$TAG" ByPassMe.apk \
            --title "ByPassMe Android $TAG" \
            --notes "Автоматическая сборка" \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean repository (keep README only)
        run: |
          cp README.release.md /tmp/README.md
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          mv /tmp/README.md README.md
          git config user.email "firstnameworst@gmail.com"
          git config user.name "firstnameworst"
          git add -A
          git commit -m "chore: post-release cleanup [skip ci]" || true
          git push
